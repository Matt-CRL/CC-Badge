<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC2 Power Toggle</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h2 {
      margin-bottom: 1em;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #555;
      border-radius: 34px;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: 0.4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background: #e0e0e0;
      border-radius: 50%;
      transition: 0.4s;
    }

    input:checked+.slider {
      background-color: #4caf50;
    }

    input:checked+.slider:before {
      transform: translateX(26px);
    }

    #status {
      margin-top: 1em;
      font-size: 1.1em;
    }
  </style>
</head>

<body>

  <h2>EC2 Power Switch</h2>

  <label class="switch">
    <input type="checkbox" id="toggleSwitch" onclick="toggleEC2()">
    <span class="slider"></span>
  </label>

  <p id="status">Instance State: Stopped</p>

  <script>
    const API_URL = "https://pu300n89c4.execute-api.ap-northeast-1.amazonaws.com/default/AutomateMyEC2Management"; 
    const checkbox = document.getElementById("toggleSwitch");
    const status = document.getElementById("status");

    async function toggleEC2() {
      const action = checkbox.checked ? "start" : "stop";
      
      status.innerText = `Instance State: ${checkbox.checked ? "Running" : "Stopped"}`;

      try {
        const response = await fetch(`${API_URL}?action=${action}`);
        const data = await response.json();

        const message = data.body ? JSON.parse(data.body).message : data.message;
        status.innerText = message.includes("starting") ? "Instance State: Running" : "Instance State: Stopped";
      } catch (err) {
        console.error(err);
        status.innerText = `Instance State: ${checkbox.checked ? "Running" : "Stopped"}`;
      }
    }
  </script>

</body>
</html>
